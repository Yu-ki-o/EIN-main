# model and data
model_name: EIN
dataset: DRWeibo
num_classes: 2
language: ch
word_embedding: word2vec
e5_model_name: intfloat/multilingual-e5-base
e5_max_length: 128
e5_batch_size: 64
result_name: see_graphmae_directed_valloss_word2vec_manifest
experiment_mode: id
ood_source_datasets: []
ood_val_domain: source
debug: False

# training parameters
seed: 0
device: cuda
lr: 0.0005
weight_decay: 0.0001
patience: 10
n_epochs: 100
selection_metric: val_loss
split: '622'
num_workers: 0

# model parameters
base_model: SEEGraphMAE
batch_size: 128
hidden_dim: 128
in_feats: 200
tokenize_mode: jieba
k: 10000
vector_size: 200
undirected: False
dropout: 0.3
global_pool: mean
max_hop: 20
lamda: 0.0
classification_class_weights: [1.0, 1.0]

# SEE-GraphMAE self-supervised objectives
see_mask_ratio: 0.25
see_mlp_layers: 2
see_decoder_layers: 2
see_dropout: 0.0
see_alpha_rec: 0.1
see_alpha_uni: 0.5
see_uniformity_t: 2.0
see_global_pool: mean

# SEE-GraphMAE test-time training
see_ttt_enabled: True
see_log_plain_test_before_ttt: True
see_ttt_epochs: 3
see_ttt_lr: 0.0005
see_ttt_weight_decay: 0.0
see_ttt_batch_size: 16
see_ttt_reset_each_batch: True
see_use_subgraph_regularizer: True
see_alpha_sub: 0.5
see_subgraph_sparsity: 0.1
see_subgraph_mask_steps: 10
see_subgraph_mask_lr: 0.1
see_subgraph_mask_init: 2.0
