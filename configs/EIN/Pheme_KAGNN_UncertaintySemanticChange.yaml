# model and data
model_name: EIN
dataset: Pheme
num_classes: 2
language: en
word_embedding: word2vec
e5_model_name: intfloat/multilingual-e5-base
e5_max_length: 128
e5_batch_size: 64
result_name: UncertaintySemanticChange_KAGNN_KAGCN_degree_1_vertical_path_view_mi
experiment_mode: id
ood_source_datasets: []
ood_val_domain: source
debug: False

# training parameters
seed: 0
device: cuda
lr: 0.0005
weight_decay: 0.0001
patience: 10
n_epochs: 100
selection_metric: val_loss
split: '622'

# model parameters
batch_size: 128
hidden_dim: 64
in_feats: 200
tokenize_mode: nltk
k: 10000
vector_size: 200
undirected: False
n_layers_conv: 2
dropout: 0.1
global_pool: mean

base_model: KAGNN_UncertaintySemanticChange
max_hop: 47
lamda: 0.0

# KAGNN backbone parameters
kagnn_variant: KAGCN
kagnn_num_layers: 2
kagnn_hidden_layers: 1
kagnn_grid_size: 4
kagnn_spline_order: 3
kagnn_heads: 4

# edge support/deny relation encoder
relation_hidden_dim: 64
relation_temperature: 1.0
stance_route_temperature: 0.5
stance_route_hard: True
lambda_edge_relation_aux: 0.1
lambda_edge_relation_warmup: 0.5
lambda_view_mi_aux: 0.01

# entropy-guided differentiable Bernoulli sampling
uncertainty_sample_temperature: 0.5
uncertainty_keep_floor: 0.05
uncertainty_sampling_warmup_epochs: 5
use_degree_importance: True
degree_importance_strength: 1.0

# replaceable node-level semantic change encoder
semantic_change_encoder: mlp
semantic_change_hidden_dim: 64
use_node_keep_in_change_pool: False

# root-path vertical attention with edge-router uncertainty bias
use_vertical_path_attention: True
vertical_path_attention_heads: 4
vertical_path_attention_max_distance: 47
vertical_path_attention_uncertainty_scale: 1.0
vertical_path_attention_residual_gate: 1.0
vertical_path_attention_dropout: 0.1

# root-relative support/uncertain/deny state, depth size, and growth trend
uncertainty_trend_hidden_dim: 64
use_trend_graph: False

# final branch fusion
classification_fusion_mode: original_change_vertical
classification_fusion_hidden_dim: 128
classification_class_weights: [1.0, 1.5]
