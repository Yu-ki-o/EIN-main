# model and data
model_name: EIN
dataset: DRWeibo
num_classes: 2
language: ch
word_embedding: word2vec
word2vec_model_path: word2vec/w2v_DRWeibo_UWeibo_jieba_200.model
e5_model_name: intfloat/multilingual-e5-base
e5_max_length: 128
e5_batch_size: 64
result_name: DRWeibo_P2T3_word2vec
experiment_mode: id
ood_source_datasets: []
ood_val_domain: source
debug: False
use_tensorboard: True
tensorboard_log_dir: tensorboard

# training parameters
seed: 0
device: cuda
lr: 0.00005
weight_decay: 0.001
patience: 15
n_epochs: 100
selection_metric: val_loss
split: '622'
num_workers: 0

# EIN data interface
base_model: P2T3
batch_size: 32
hidden_dim: 512
in_feats: 200
tokenize_mode: jieba
k: 10000
vector_size: 200
undirected: False
max_hop: 20
lamda: 0.0

# P2T3
p2t3_d_model: 512
p2t3_num_layers: 3
p2t3_num_heads: 8
p2t3_dim_feedforward: 1024
p2t3_dropout: 0.1
p2t3_max_sequence_length: 1000
p2t3_max_chain_length: 40
p2t3_max_chain_identifiers: 512
p2t3_max_depth: 40
p2t3_use_chain_identifier: True
p2t3_use_depth_embedding: True
p2t3_use_type_embedding: True
p2t3_measure: JSD
p2t3_unsup_weight: 0.0
p2t3_pretrained_path: checkpoints/P2T3/DRWeibo_UWeibo_word2vec.pt

# native pre-training
p2t3_pretrain_dataset: UWeibo
p2t3_pretrain_raw_dir: dataset/UWeibo/dataset/raw
p2t3_pretrain_processed_dir: dataset/UWeibo/dataset/processed
p2t3_pretrain_epochs: 30
p2t3_pretrain_batch_size: 8
p2t3_pretrain_effective_batch_size: 32
p2t3_pretrain_lr: 0.00005
p2t3_pretrain_weight_decay: 0.001
p2t3_pretrain_warmup_ratio: 0.1
p2t3_pretrain_gradient_clip: 1.0
p2t3_pretrain_amp: True
p2t3_pretrain_resume: True
p2t3_pretrain_num_workers: 0
p2t3_pretrain_cache_chunk_size: 512
p2t3_word2vec_source_datasets: [DRWeibo]
p2t3_word2vec_window: 5
p2t3_word2vec_min_count: 5
p2t3_word2vec_workers: 8
p2t3_word2vec_epochs: 30

classification_class_weights: [1.0, 1.0]
