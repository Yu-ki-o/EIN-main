model_name: EIN
dataset: Twitter
num_classes: 2
language: en
word_embedding: word2vec
result_name: Twitter_EBGCN_BiGCN_StateAuxSameDiff_word2vec
experiment_mode: id
ood_source_datasets: []
ood_val_domain: source
debug: false
seed: 0
device: cuda
lr: 0.0005
weight_decay: 0.0001
patience: 10
n_epochs: 100
selection_metric: val_loss
split: '622'
num_workers: 0
base_model: EBGCN_BiGCN_StateAuxSameDiff
batch_size: 32
hidden_dim: 64
in_feats: 200
tokenize_mode: naive
k: 10000
vector_size: 200
undirected: false
