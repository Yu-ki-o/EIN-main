# model and data
model_name: TCSR
dataset: DRWeibo
num_classes: 2
language: ch
word_embedding: word2vec
e5_model_name: intfloat/multilingual-e5-base
e5_max_length: 128
e5_batch_size: 64
result_name: TCSR_word2vec
experiment_mode: id
ood_source_datasets: []
ood_val_domain: source
debug: False

# training parameters
seed: 0
seeds: 0,1,2,3,4
device: cuda
lr: 0.0005
weight_decay: 0.0001
patience: 10
n_epochs: 100
selection_metric: val_loss # val_loss, val_acc, val_auc, or val_f1
split: '622'
checkpoint_dir: checkpoints/tcsr/DRWeibo

# dataset/cache parameters
base_model: TCSR
dataset_loader: resgcn
batch_size: 128
hidden_dim: 128
in_feats: 200
tokenize_mode: jieba
k: 10000
vector_size: 200
undirected: False
max_hop: 20

# TCSR parameters
gnn_layers: 2
conv_type: gcn # gcn, gat, bigcn, or resgcn
gat_heads: 2
resgcn_residual: True
edge_norm: True
dropout: 0.3
window_k: 2
min_future_nodes: 1
stance_loss_weight: 1.0
use_anomaly: True
use_isolation: True
use_dominance: True
use_threshold: True
use_external_stance: True
