# model and data
model_name: EIN
dataset: Pheme
num_classes: 2
language: en
word_embedding: word2vec
e5_model_name: intfloat/multilingual-e5-base
e5_max_length: 128
e5_batch_size: 64
result_name: EIN_bigcn_uncertaintydist_directed_valloss
experiment_mode: id
ood_source_datasets: []
ood_val_domain: source
debug: False

# training parameters
seed: 0
device: cuda
lr: 0.0005
weight_decay: 0.0001
patience: 10
n_epochs: 100
selection_metric: val_loss
split: '622'

# model parameters
batch_size: 128
hidden_dim: 64
in_feats: 200
tokenize_mode: nltk
k: 10000
vector_size: 200
undirected: False
n_layers_conv: 3
n_layers_feat: 1
n_layers_fc: 2
skip_connection: True
res_branch: BNConvReLU
dropout: 0.1
edge_norm: True
global_pool: sum

base_model: BiGCN_Uncertainty
max_hop: 47
init_alpha: 1.0
init_beta: 1.0
lamda: 0.5

# uncertainty-aware epidemiology encoder
eiu_uncertainty_max: 8.0
eiu_uncertainty_reg: 0.1
uncertainty_attention_scale: 1.0
uncertainty_fusion_gate_bias: -2.0
uncertainty_fusion_confidence_scale: 0.5
uncertainty_fusion_confidence_floor: 0.25
use_soft_state_targets: True
state_loss_weight_floor: 0.2
soft_state_uncertainty_weight: 1.0
lambda_edge_state_aux: 0.05
lambda_root_state_aux: 0.05
edge_uncertainty_reg: 0.1
root_uncertainty_reg: 0.1
edge_uncertainty_max: 8.0
root_uncertainty_max: 8.0
soft_state_path_decay: 0.7
soft_state_path_uncertainty_weight: 0.5
soft_state_root_uncertainty_weight: 0.3
soft_state_consistency_weight: 0.5
soft_state_entropy_weight: 0.5
soft_state_teacher_blend: 0.0
soft_state_root_teacher_blend: 0.0
soft_state_label_smoothing: 0.05
soft_state_label_uncertainty: 0.1
soft_state_root_label_uncertainty: 0.1
