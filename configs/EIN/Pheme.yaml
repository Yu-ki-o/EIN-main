# model and data
model_name: EIN
dataset: Pheme
num_classes: 2
language: en # en or ch
word_embedding: word2vec # word2vec or multilingual-e5-base
e5_model_name: intfloat/multilingual-e5-base
e5_max_length: 128
e5_batch_size: 64
result_name: EIN_bigcn_directed_valloss_manifest # set a name to save logs under experiments/EIN/Pheme/<result_name>
experiment_mode: id # id or strict_ood
ood_source_datasets: []
ood_val_domain: source # source or target
debug: False

# training parameters
seed: 0
device: cuda
lr: 0.0005
weight_decay: 0.0001
patience: 10
n_epochs: 100
selection_metric: val_loss
split: '622'

# model parameters
batch_size: 128
hidden_dim: 64
in_feats: 200
tokenize_mode: nltk
k: 10000
vector_size: 200
undirected: False
n_layers_conv: 3
n_layers_feat: 1
n_layers_fc: 2
skip_connection: True
res_branch: BNConvReLU
dropout: 0.1
edge_norm: True
global_pool: sum


base_model: BiGCN
max_hop: 47
init_alpha: 1.0
init_beta: 1.0
lamda: 0.5
