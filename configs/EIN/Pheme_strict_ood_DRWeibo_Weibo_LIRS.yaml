# model and data
model_name: EIN
dataset: Pheme
num_classes: 2
language: en
word_embedding: multilingual-e5-base
e5_model_name: intfloat/multilingual-e5-base
e5_max_length: 128
e5_batch_size: 64
e5_local_files_only: True
result_name: strict_ood_pheme_from_drweibo_weibo_lirs
experiment_mode: strict_ood
ood_source_datasets:
  - DRWeibo
  - Weibo
ood_val_domain: source
debug: False

# training parameters
seed: 0
device: cuda
lr: 0.0005
weight_decay: 0.0001
patience: 10
n_epochs: 100
split: '622'

# model parameters
base_model: LIRS
batch_size: 128
hidden_dim: 64
in_feats: 768
tokenize_mode: nltk
k: 10000
vector_size: 200
undirected: True
n_layers_conv: 3
dropout: 0.1
global_pool: sum
max_hop: 72

# LIRS regularization
lirs_hsic_penalty: 0.1
lirs_kernel_method: rbf
lirs_sigma: 0.1
lirs_normalize_hsic_inputs: True
