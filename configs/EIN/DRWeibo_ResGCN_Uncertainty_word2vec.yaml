# model and data
model_name: EIN
dataset: DRWeibo
num_classes: 2
language: ch
word_embedding: word2vec
e5_model_name: intfloat/multilingual-e5-base
e5_max_length: 128
e5_batch_size: 64
result_name: EIN_resgcn_uncertainty_directed_valacc
experiment_mode: id
ood_source_datasets: []
ood_val_domain: source
debug: False

# training parameters
seed: 0
device: cuda
lr: 0.0005
weight_decay: 0.0001
patience: 10
n_epochs: 100
selection_metric: val_acc
split: '622'

# model parameters
batch_size: 128
hidden_dim: 128
TDdroprate: 0.2
BUdroprate: 0.2
tokenize_mode: jieba
k: 10000
vector_size: 200
in_feats: 200
n_layers_conv: 3
aug1: DropEdge,mean,0.2,0.7
aug2: NodeDrop,0.2,0.7
n_layers_feat: 1
n_layers_fc: 2
skip_connection: True
res_branch: BNConvReLU
dropout: 0.3
edge_norm: True
global_pool: sum
undirected: False

base_model: ResGCN_Uncertainty
max_hop: 20
init_alpha: 0.0
init_beta: 0.0
lamda: 1

# uncertainty-aware epidemiology encoder
eiu_uncertainty_max: 8.0
eiu_uncertainty_reg: 1.0
