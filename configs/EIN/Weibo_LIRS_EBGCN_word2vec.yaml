model_name: EIN
dataset: Weibo
num_classes: 2
language: ch
word_embedding: word2vec
result_name: Weibo_LIRS_EBGCN_word2vec
experiment_mode: id
ood_source_datasets: []
ood_val_domain: source
debug: false
seed: 0
device: cuda
lr: 0.0005
weight_decay: 0.00001
patience: 10
n_epochs: 100
selection_metric: val_loss
split: '622'
num_workers: 0
base_model: LIRS_EBGCN
batch_size: 32
hidden_dim: 64
in_feats: 200
tokenize_mode: jieba
k: 10000
vector_size: 200
undirected: false
dropout: 0.3
max_hop: 72

# Select "bigcn" or "resgcn" without changing base_model.
lirs_ebgcn_backbone: bigcn
n_layers_conv: 2
n_layers_fc: 2
skip_connection: true
edge_norm: true
global_pool: sum

ebgcn_hidden_dim: 64
ebgcn_output_dim: 64
ebgcn_edge_num: 2
ebgcn_edge_infer_td: true
ebgcn_edge_infer_bu: true
ebgcn_edge_loss_weight: 1.0
lirs_removal_strength: 0.35
lirs_edge_spurious_suppression: 0.25
lirs_spurious_ratio: 0.30
lirs_spurious_dropout: 0.1
lirs_detach_spurious_projection: true
lirs_shortcut_loss_weight: 0.10
lirs_hsic_penalty: 0.01
lirs_conditional_hsic_penalty: 0.02
lirs_infomax_loss_weight: 0.02
lirs_gate_balance_weight: 0.01
lirs_num_clusters: 2
lirs_prototype_momentum: 0.90
lirs_cluster_grl_scale: 1.0
lirs_cluster_loss_weight: 0.02
lirs_gradient_clip_norm: 5.0

