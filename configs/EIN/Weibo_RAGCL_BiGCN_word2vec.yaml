# model and data
model_name: EIN
dataset: Weibo
num_classes: 2
language: ch
word_embedding: word2vec
e5_model_name: intfloat/multilingual-e5-base
e5_max_length: 128
e5_batch_size: 64
result_name: null
experiment_mode: id
ood_source_datasets: []
ood_val_domain: source
debug: False

# training parameters
seed: 0
device: cuda
lr: 0.0005
weight_decay: 0.00001
patience: 10
n_epochs: 100
split: '622'

# model parameters
batch_size: 128
hidden_dim: 128
TDdroprate: 0.2
BUdroprate: 0.2
tokenize_mode: jieba
k: 10000
vector_size: 200
in_feats: 200
n_layers_conv: 3
aug1: DropEdge,mean,0.2,0.7
aug2: NodeDrop,0.2,0.7
n_layers_feat: 1
n_layers_fc: 2
skip_connection: True
res_branch: BNConvReLU
dropout: 0.3
edge_norm: True
global_pool: sum
undirected: True

base_model: RAGCL_BiGCN
max_hop: 72
use_unsup_loss: True
ragcl_lamda: 0.001
centrality: PageRank
