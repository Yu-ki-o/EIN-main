model_name: EIN
dataset: DRWeibo
num_classes: 2
language: ch
word_embedding: word2vec
result_name: DRWeibo_EBGCN_ResGCN_StateAuxSameDiff_word2vec
experiment_mode: id
ood_source_datasets: []
ood_val_domain: source
debug: false
seed: 0
device: cuda
lr: 0.0005
weight_decay: 0.0001
patience: 10
n_epochs: 100
selection_metric: val_loss
split: '622'
num_workers: 0
base_model: EBGCN_ResGCN_StateAuxSameDiff
batch_size: 32
hidden_dim: 64
in_feats: 200
tokenize_mode: jieba
k: 10000
vector_size: 200
undirected: false
max_hop: 20
n_layers_conv: 2
n_layers_fc: 2
skip_connection: true
dropout: 0.3
edge_norm: true
global_pool: sum

# EBGCN edge inference
ebgcn_hidden_dim: 64
ebgcn_edge_num: 2
ebgcn_edge_infer_td: true
ebgcn_edge_infer_bu: true
ebgcn_edge_loss_weight: 1.0

# Same/different dual-subgraph supervision
ebgcn_state_aux_loss_weight: 1.0
state_aux_dual_view: true
state_aux_transition_attention: false
state_aux_reply_target_attention: false
state_aux_cross_view_attention: false
state_aux_edge_relation_routing: false
state_aux_preserve_route_strength: false
state_aux_num_states: 2
state_aux_temp: 1.0
state_aux_detach_route: false
lambda_node_state_aux: 0.1
lambda_edge_same_aux: 0.1
lambda_same_diff_sep: 0.01
same_path_blend: 1.0
diff_path_blend: 1.0
same_diff_gate_blend: 1.0
same_dulreg_blend: 1.0
same_dulreg_logvar_min: -8.0
same_dulreg_logvar_max: 8.0
same_dulreg_precision_max: 10000.0
