# model and data
model_name: EIN
dataset: Weibo
num_classes: 2
language: ch
word_embedding: word2vec
e5_model_name: intfloat/multilingual-e5-base
e5_max_length: 128
e5_batch_size: 64
result_name: UncertaintySemanticChange_resGCN_change_semantic_tree_no_sampling_manifest_ds_mlp_sumpool
experiment_mode: id
ood_source_datasets: []
ood_val_domain: source
debug: False
use_tensorboard: True
tensorboard_log_dir: tensorboard

# training parameters
seed: 0
device: cuda
lr: 0.0005
weight_decay: 0.00001
patience: 15
n_epochs: 100
selection_metric: val_loss
split: '622'
legacy_dataset_cache_name: UncertaintySemanticChange_ResGCN_change_semantic_tree_no_sampling_manifest_patience15_ds1

# model parameters
batch_size: 128
hidden_dim: 128
in_feats: 200
tokenize_mode: jieba
k: 10000
vector_size: 200
undirected: False
n_layers_conv: 2
dropout: 0.3
global_pool: sum

base_model: ResGCN_UncertaintySemanticChange
max_hop: 72
lamda: 0.0

# edge support/deny relation encoder
relation_hidden_dim: 128
relation_temperature: 1.0
stance_route_temperature: 0.5
stance_route_hard: True
lambda_edge_relation_aux: 0.1
lambda_edge_relation_warmup: 0.5
lambda_view_mi_aux: 0.01 #原来是0.0,第二次是0.01

# optional Dempster-Shafer edge mass routing
use_ds_mass_routing: True
ds_unknown_prior: 1.0 #原来是2.0
lambda_ds_unknown_edge_aux: 0.0

# entropy-guided differentiable Bernoulli sampling
use_uncertainty_sampling: False
uncertainty_sample_temperature: 0.5
uncertainty_keep_floor: 0.1
uncertainty_sampling_warmup_epochs: 5
use_degree_importance: True
degree_importance_strength: 1.0

# replaceable node-level semantic change encoder
semantic_change_encoder: mlp
semantic_change_hidden_dim: 128
# True: node_keep-weighted change pooling; False: ordinary graph pooling
use_node_keep_in_change_pool: False

# root-path vertical attention with edge-router uncertainty bias
use_vertical_path_attention: False
vertical_path_attention_heads: 4
vertical_path_attention_max_distance: 72
vertical_path_attention_uncertainty_scale: 1.0
vertical_path_attention_residual_gate: 1.0
vertical_path_attention_dropout: 0.3

# inject support/deny node semantics and depth into the propagation tree
use_semantic_tree_transformer: True
semantic_tree_transformer_layers: 2  #扫描结果显示这个是关键参数
semantic_tree_transformer_heads: 4
semantic_tree_transformer_ffn_dim: 256
semantic_tree_transformer_dropout: 0.3
semantic_tree_transformer_max_depth: 72 #扫描结果显示这个是关键参数
semantic_tree_depth_dim: 128
semantic_tree_transformer_pool: sum

# root-relative support/uncertain/deny state, depth size, and growth trend
uncertainty_trend_hidden_dim: 128
use_trend_graph: False

# final branch fusion
classification_fusion_mode: change_semantic_tree # change_semantic_tree
classification_fusion_hidden_dim: 256
classification_class_weights: [1.0, 1.5] #原来是[1.0, 1.0]

# optional graph-level Dempster-Shafer fusion over final branches
use_global_ds_fusion: False
global_ds_unknown_prior: 1.0
global_ds_temperature: 1.0
global_ds_fusion_rule: dempster
global_ds_hidden_dim: 128

use_conflict_field_bottleneck: true
conflict_encoder_mode: transformer
conflict_attention_heads: 4
conflict_attention_layers: 1
conflict_attention_ffn_dim: 256
conflict_attention_dropout: 0.3
conflict_attention_max_depth: 72
conflict_attention_depth_dim: 128
conflict_attention_pool: mean
conflict_attention_key_scale: 1.0
conflict_attention_boundary_scale: 1.0
conflict_attention_region_scale: 1.0
lambda_conflict_label_aux: 0.1
lambda_conflict_size_aux: 0.01
lambda_conflict_redundancy_aux: 0.01
conflict_keep_threshold: 0.5
conflict_balance_weight: 1.0
conflict_high_frequency_weight: 0.5
